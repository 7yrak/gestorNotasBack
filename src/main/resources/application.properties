spring.application.name=gestor-notas
server.port=8082
server.address=${SERVER_ADDRESS:0.0.0.0}

# Configuración de base de datos
spring.datasource.url=${DB_URL:jdbc:postgresql://127.0.0.1:5432/gestor_notas?stringtype=unspecified}
spring.datasource.username=${DB_USERNAME:sergiofica}
spring.datasource.password=${DB_PASSWORD:local1234$}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Optimización para Java 21 (Habilitar hilos virtuales para Tomcat)
spring.threads.virtual.enabled=true

# Orígenes separados por coma. Sobrescribir CORS_ALLOWED_ORIGINS en producción.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://10.51.9.17,http://localhost:4200,http://127.0.0.1:4200}
